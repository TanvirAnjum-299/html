<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Changes To a rectangle</title>
    <style>
        .rectangle{
            border: 1px solid black;
            width: 200px;
            height: 200px;
            margin:auto;
        }
        .buttons{
           padding: 20px;
           width: 200px;
           margin: auto;
           text-align: center;
        }
    </style>
</head>
<body>
<div class="rectangle"></div>
<div class="buttons">
    <button onclick="changeToCircle()">Make Circle</button>
    <Button onclick="hideRect()">Hide</Button>
    <Button onclick="showRect()">Show</Button>
</div>
</body>
 <script src="rectangle.js"></script>
</html>
